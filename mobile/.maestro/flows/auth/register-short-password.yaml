appId: com.resourcrelationnelles.app
name: "Register - rejects short password"
---
- launchApp:
    clearState: true
- tapOn: "Créer un compte"
- assertVisible: "Créer un compte"
- tapOn: "Email"
- inputText: "short@test.local"
- hideKeyboard
- tapOn: "Mot de passe"
- inputText: "abc"
- hideKeyboard
- tapOn: "Créer mon compte"
- assertVisible: "Le mot de passe doit faire au moins 8 caractères"
